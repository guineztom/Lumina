# ============================================================
# NETLIFY — Configuration Lumina AI
# ============================================================

[build]
  publish = "."
  command = "node build.js"

# Auth Netlify Identity pour Decap CMS
[[plugins]]
  package = "@netlify/plugin-netlify-identity"

# Redirect SPA (toutes les URLs → index.html)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# SAUF les fichiers qui existent vraiment
[[redirects]]
  from = "/admin/*"
  to = "/admin/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/content/*"
  to = "/content/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200
  force = true

# En-têtes de sécurité
[[headers]]
  for = "/*"
  [headers.values]
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Permettre l'iframe pour l'admin CMS
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"

# Cache long pour assets CSS/JS
[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Pas de cache pour les données JSON (mises à jour fréquentes)
[[headers]]
  for = "/content/*"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"
