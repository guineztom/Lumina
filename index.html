<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- ── SEO dynamique : mis à jour par updateSEO() à chaque navigation ── -->
  <title id="seo-title">Lumina AI — Découvrez, comparez et choisissez les meilleurs outils IA</title>
  <meta id="seo-desc" name="description" content="Lumina AI est l'annuaire de référence des outils IA pour particuliers, indépendants, coachs et micro-entrepreneurs. Fiches détaillées, comparatifs et guides pratiques." />
  <link id="seo-canonical" rel="canonical" href="https://lumina-ai.fr/" />

  <!-- ── Open Graph (partage réseaux sociaux) ── -->
  <meta id="og-title" property="og:title" content="Lumina AI — Les meilleurs outils IA pour indépendants" />
  <meta id="og-desc" property="og:description" content="Lumina AI est l'annuaire de référence des outils IA pour particuliers, indépendants, coachs et micro-entrepreneurs." />
  <meta id="og-url" property="og:url" content="https://lumina-ai.fr/" />
  <meta id="og-image" property="og:image" content="https://lumina-ai.fr/assets/og-default.jpg" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="fr_FR" />
  <meta property="og:site_name" content="Lumina AI" />

  <!-- ── Twitter Card ── -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta id="tw-title" name="twitter:title" content="Lumina AI — Les meilleurs outils IA pour indépendants" />
  <meta id="tw-desc" name="twitter:description" content="Lumina AI est l'annuaire de référence des outils IA pour particuliers, indépendants, coachs et micro-entrepreneurs." />
  <meta id="tw-image" name="twitter:image" content="https://lumina-ai.fr/assets/og-default.jpg" />

  <!-- ── Indexation ── -->
  <meta name="robots" content="index, follow" />
  <meta name="author" content="Lumina AI" />

  <!-- ── Fonts ── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/main.css" />
</head>
<body>

<!-- ============================================================
  NAVIGATION
============================================================ -->
<nav class="nav" id="nav">
  <div class="nav-inner">
    <button class="nav-logo" onclick="navigate('home')">Lumina <em>AI</em></button>
    <div class="nav-links">
      <button class="nav-link" id="nl-home" onclick="navigate('home')">Accueil</button>
      <button class="nav-link" id="nl-outils" onclick="navigate('outils')">Outils IA</button>
      <button class="nav-link" id="nl-blog" onclick="navigate('blog')">Blog</button>
      <button class="nav-link" id="nl-contact" onclick="navigate('contact')">Contact</button>
    </div>
    <div class="nav-actions">
      <button class="btn btn-ghost btn-sm" onclick="navigate('soumettre')">Soumettre un outil</button>
      <button class="btn btn-primary btn-sm" onclick="navigate('newsletter')">Newsletter</button>
    </div>
    <button class="hamburger" onclick="toggleMenu()" aria-label="Menu">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path id="ham-open" d="M4 6h16M4 12h16M4 18h16"/>
        <path id="ham-close" d="M6 18L18 6M6 6l12 12" style="display:none"/>
      </svg>
    </button>
  </div>
</nav>

<!-- Mobile Menu -->
<div class="mobile-menu" id="mobile-menu">
  <button class="mobile-nav-link" onclick="navigate('home'); toggleMenu()">Accueil</button>
  <button class="mobile-nav-link" onclick="navigate('outils'); toggleMenu()">Outils IA</button>
  <button class="mobile-nav-link" onclick="navigate('blog'); toggleMenu()">Blog</button>
  <button class="mobile-nav-link" onclick="navigate('contact'); toggleMenu()">Contact</button>
  <div style="margin-top:16px">
    <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="navigate('soumettre'); toggleMenu()">Soumettre un outil</button>
  </div>
</div>

<!-- ============================================================
  PAGES — rendered via JS
============================================================ -->
<main id="app"></main>

<!-- ============================================================
  DATA
============================================================ -->
<!-- Loader dynamique JSON (remplace outils.js et blog.js) -->
<script src="data/data-loader.js"></script>

<!-- ============================================================
  APP ENGINE
============================================================ -->
<script>
// ---- Router ----
let currentPage = 'home';
let currentParam = null;
let mobileOpen = false;
let activeSector = null;
let activeFilter = 'all';

// ── SEO : Mise à jour des balises <head> à chaque navigation ────────────
const SITE_URL = 'https://lumina-ai.fr';
const SITE_NAME = 'Lumina AI';

function updateSEO({ title, description, url, image }) {
  const fullTitle = title + ' | ' + SITE_NAME;
  const img = image || SITE_URL + '/assets/og-default.jpg';
  const fullUrl = SITE_URL + (url || '/');

  document.getElementById('seo-title').textContent = fullTitle;
  document.getElementById('seo-desc').setAttribute('content', description);
  document.getElementById('seo-canonical').setAttribute('href', fullUrl);
  document.getElementById('og-title').setAttribute('content', fullTitle);
  document.getElementById('og-desc').setAttribute('content', description);
  document.getElementById('og-url').setAttribute('content', fullUrl);
  document.getElementById('og-image').setAttribute('content', img);
  document.getElementById('tw-title').setAttribute('content', fullTitle);
  document.getElementById('tw-desc').setAttribute('content', description);
  document.getElementById('tw-image').setAttribute('content', img);
  document.title = fullTitle;
}

function getSEOForPage(page, param) {
  switch(page) {
    case 'home':
      return {
        title: "Découvrez, comparez et choisissez les meilleurs outils IA",
        description: "Lumina AI est l'annuaire des outils IA pour particuliers, indépendants, coachs et micro-entrepreneurs. Fiches détaillées, comparatifs et guides pratiques.",
        url: '/'
      };
    case 'outils': {
      const sec = activeSector ? (window.SECTEURS || []).find(s => s.id === activeSector) : null;
      return sec ? {
        title: sec.headline || ("Outils IA — " + sec.label),
        description: sec.sub || ("Les meilleurs outils IA pour " + sec.label + ". Sélection testée et commentée par Lumina AI."),
        url: '/#outils/' + sec.id
      } : {
        title: "Tous les outils IA pour indépendants et coachs",
        description: "Annuaire complet des meilleurs outils IA : créer un site, rédaction SEO, réseaux sociaux, vidéo, image, marketing. Filtrez et comparez.",
        url: '/#outils'
      };
    }
    case 'tool': {
      const tool = (window.OUTILS || []).find(t => t.id === param);
      return tool ? {
        title: tool.name + " — Avis, tarifs et cas d'usage",
        description: tool.metaDescription || (tool.tagline + " Fonctionnalités, tarifs et cas d'usage de " + tool.name + " sur Lumina AI."),
        url: '/#tool/' + param,
        image: tool.logo
      } : { title: "Fiche outil IA", description: "Détail d'un outil IA sur Lumina AI.", url: '/' };
    }
    case 'blog':
      return {
        title: "Blog IA — Guides pratiques et analyses pour indépendants",
        description: "Guides, comparatifs et stratégies pour utiliser l'IA en tant qu'indépendant, coach ou micro-entrepreneur. Publiés chaque semaine par Lumina AI.",
        url: '/#blog'
      };
    case 'article': {
      const art = (window.ARTICLES || []).find(a => a.slug === param);
      return art ? {
        title: art.title,
        description: art.metaDescription || art.intro.substring(0, 155),
        url: '/#article/' + param,
        image: art.coverPhoto
      } : { title: "Article — Lumina AI", description: "Article sur les outils IA.", url: '/' };
    }
    case 'contact':
      return {
        title: "Contact — Partenariat, suggestion d'outil, questions",
        description: "Contactez Lumina AI pour toute question, suggestion d'outil IA, demande de partenariat ou proposition d'article.",
        url: '/#contact'
      };
    case 'qui-sommes-nous':
      return {
        title: "Qui sommes-nous — Approche éditoriale et transparence",
        description: "Lumina AI est un annuaire indépendant d'outils IA pour particuliers et indépendants. Notre approche éditoriale et notre politique de transparence.",
        url: '/#qui-sommes-nous'
      };
    case 'cgv':
      return {
        title: "Conditions Générales d'Utilisation",
        description: "Conditions d'utilisation du site Lumina AI — annuaire indépendant d'outils IA pour indépendants et coachs.",
        url: '/#cgv'
      };
    case 'confidentialite':
      return {
        title: "Politique de confidentialité et RGPD",
        description: "Politique de confidentialité et gestion des données personnelles de Lumina AI, conforme au RGPD.",
        url: '/#confidentialite'
      };
    default:
      return {
        title: "Découvrez, comparez et choisissez les meilleurs outils IA",
        description: "Lumina AI — annuaire de référence des outils IA pour indépendants et coachs.",
        url: '/'
      };
  }
}
function navigate(page, param) {
  currentPage = page;
  currentParam = param || null;
  window.scrollTo(0, 0);
  render();
  setActiveNav(page);

  // ── Mise à jour URL (hash) ──
  const hash = param ? '#' + page + '/' + param : '#' + page;
  history.replaceState(null, '', hash === '#home' ? '/' : hash);

  // ── Mise à jour SEO <head> ──
  const seo = getSEOForPage(page, param);
  updateSEO(seo);
}

function setActiveNav(page) {
  document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
  const map = { home: 'nl-home', outils: 'nl-outils', blog: 'nl-blog', contact: 'nl-contact' };
  if (map[page]) document.getElementById(map[page])?.classList.add('active');
}

function toggleMenu() {
  mobileOpen = !mobileOpen;
  document.getElementById('mobile-menu').classList.toggle('open', mobileOpen);
  document.getElementById('ham-open').style.display = mobileOpen ? 'none' : 'block';
  document.getElementById('ham-close').style.display = mobileOpen ? 'block' : 'none';
}

// ---- Main render ----
function render() {
  const app = document.getElementById('app');
  switch(currentPage) {
    case 'home':       app.innerHTML = renderHome(); break;
    case 'outils':     app.innerHTML = renderOutils(); break;
    case 'tool':       app.innerHTML = renderTool(currentParam); break;
    case 'blog':       app.innerHTML = renderBlog(); break;
    case 'article':    app.innerHTML = renderArticle(currentParam); break;
    case 'contact':    app.innerHTML = renderContact(); break;
    case 'soumettre':  app.innerHTML = renderSoumettre(); break;
    case 'newsletter': app.innerHTML = renderNewsletter(); break;
    case 'cgv':        app.innerHTML = renderCGV(); break;
    case 'confidentialite': app.innerHTML = renderConfidentialite(); break;
    case 'qui-sommes-nous': app.innerHTML = renderQuiSommesNous(); break;
    default:           app.innerHTML = render404();
  }
}

// ---- Helpers ----
function stars(score) {
  const full = Math.floor(score);
  const empty = 5 - full;
  return '★'.repeat(full) + '☆'.repeat(empty);
}

function badgeHtml(tool) {
  if (!tool.badge) return '';
  const cls = { best: 'badge-best', new: 'badge-new', api: 'badge-api' }[tool.badge] || '';
  return `<span class="badge ${cls}">${tool.badgeLabel || tool.badge}</span>`;
}

function toolCardHtml(tool) {
  return `
  <div class="card tool-card" onclick="navigate('tool','${tool.id}')">
    <div class="tool-card-header">
      <img src="${tool.logo}" alt="${tool.name}" class="tool-logo" loading="lazy" />
      <div class="tool-meta">
        <div class="tool-name">${tool.name}</div>
        <div class="tool-tagline">${tool.tagline}</div>
      </div>
      ${badgeHtml(tool)}
    </div>
    <div class="tool-tags">
      ${tool.tags.map(t => `<span class="tool-tag">${t}</span>`).join('')}
    </div>
    <div class="tool-card-footer">
      <span class="tool-price">${tool.priceType}</span>
      <span class="tool-price" style="color:var(--ink)">${tool.priceDetails || tool.price || 'Sur devis'}</span>
    </div>
  </div>`;
}

function blogCardHtml(article) {
  return `
  <div class="card blog-card" onclick="navigate('article','${article.slug}')">
    <img src="${article.coverPhoto}" alt="${article.coverAlt || article.title}" class="blog-card-img" loading="lazy" />
    <div class="blog-card-body">
      <div class="blog-card-label">${article.sectorLabel}</div>
      <div class="blog-card-title">${article.title}</div>
      <div class="blog-card-meta">
        <span>${article.date || ''}</span>
        <span>·</span>
        <span>${article.readTime}</span>
      </div>
    </div>
  </div>`;
}

function renderNewsletter() {
  return `
  <div class="newsletter" style="min-height:100vh;display:flex;align-items:center">
    <div class="container" style="text-align:center;max-width:540px;margin:0 auto">
      <div class="hero-eyebrow" style="background:rgba(255,255,255,.1);color:white;margin-bottom:24px">Newsletter</div>
      <h2 style="font-family:var(--font-heading);font-weight:900;font-size:2.2rem;color:white;margin-bottom:12px">
        Chaque lundi, les meilleurs outils IA.
      </h2>
      <p style="color:#9898b0;margin-bottom:32px">
        Testés, classés, expliqués. Pas de bruit, juste ce qui marche dans votre contexte professionnel.
      </p>
      <div class="newsletter-form">
        <input type="email" placeholder="votre@email.com" />
        <button class="btn btn-primary" onclick="handleNewsletter()">S'abonner</button>
      </div>
      <p style="font-size:12px;color:#6b6b88;margin-top:12px">Gratuit · Désinscription en un clic</p>
      <button class="btn btn-ghost" style="margin-top:24px;color:#9898b0;border-color:#333" onclick="navigate('home')">← Retour</button>
    </div>
  </div>`;
}

function handleNewsletter() {
  // TODO: Connecter à Netlify Forms ou Mailchimp
  // Option 1 (Netlify): Remplacez par un <form netlify> dans la page HTML
  // Option 2 (Mailchimp): Intégrez l'API Mailchimp ici
  alert('Merci ! Vous serez notifié dès le prochain numéro. (À connecter à Netlify Forms ou Mailchimp)');
}

// ================================================================
// PAGE : ACCUEIL
// ================================================================
function renderHome() {
  const featured = OUTILS.filter(t => t.tested && t.score >= 4.7).slice(0, 4);
  const latestArticles = [...ARTICLES].sort((a,b) => b.date?.localeCompare(a.date || '')).slice(0, 3);

  return `
  <!-- Hero -->
  <section class="hero">
    <div class="container">
      <div class="hero-eyebrow">✦ Intelligence Gallery</div>
      <h1 class="display-xl">Trouvez l'outil IA<br>fait pour votre métier.</h1>
      <p class="sub">Particuliers, indépendants, coachs et micro-entrepreneurs — trouvez l'outil IA qui va vraiment changer votre quotidien.</p>
      <div class="hero-actions">
        <button class="btn btn-primary btn-lg" onclick="navigate('outils')">Explorer les outils →</button>
        <button class="btn btn-ghost btn-lg" onclick="navigate('blog')">Lire le blog</button>
      </div>
      <div style="margin-top:32px;padding:12px 20px;background:rgba(91,94,246,.06);border-radius:var(--radius);display:inline-block;font-size:12px;color:var(--ink-muted);border:1px solid rgba(91,94,246,.15)">
        ℹ️ <strong>Transparence</strong> — Analyses éditoriales indépendantes. Certains liens sont affiliés (sans surcoût pour vous).
        <button onclick="navigate('qui-sommes-nous')" style="color:var(--accent);font-size:12px;font-weight:600;background:none;border:none;cursor:pointer;padding:0;margin-left:4px">En savoir plus →</button>
      </div>
      <div class="hero-stats">
        <div>
          <div class="hero-stat-value">${OUTILS.length}+</div>
          <div class="hero-stat-label">Outils répertoriés</div>
        </div>
        <div>
          <div class="hero-stat-value">${SECTEURS.length}</div>
          <div class="hero-stat-label">Secteurs couverts</div>
        </div>
        <div>
          <div class="hero-stat-value">${OUTILS.filter(t=>t.tested).length}</div>
          <div class="hero-stat-label">Outils testés</div>
        </div>
        <div>
          <div class="hero-stat-value">${ARTICLES.length}</div>
          <div class="hero-stat-label">Articles publiés</div>
        </div>
      </div>
    </div>
  </section>

  <!-- Secteurs -->
  <section class="section" style="background:var(--surface-2)">
    <div class="container">
      <h2 class="display-md" style="margin-bottom:8px">Par secteur</h2>
      <p class="text-muted" style="margin-bottom:36px">Filtrez par domaine professionnel</p>
      <div class="grid-3">
        ${SECTEURS.map(s => {
          const count = OUTILS.filter(t => t.sector.includes(s.id)).length;
          return `
          <div class="card" style="cursor:pointer;overflow:hidden" onclick="navigate('outils'); setSector('${s.id}')">
            <div style="position:relative;height:140px;overflow:hidden">
              <img src="${s.photo}" alt="${s.label}" style="width:100%;height:100%;object-fit:cover" loading="lazy" />
              <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.6) 0%,transparent 60%)"></div>
              <div style="position:absolute;bottom:14px;left:16px;color:white">
                <div style="font-family:var(--font-heading);font-weight:800;font-size:1rem">${s.label}</div>
                <div style="font-size:12px;opacity:.8">${count} outil${count>1?'s':''}</div>
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
  </section>

  <!-- Outils en vedette -->
  <section class="section">
    <div class="container">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;flex-wrap:gap">
        <div>
          <h2 class="display-md" style="margin-bottom:4px">Sélection de la semaine</h2>
          <p class="text-muted">Notre sélection du moment, testée et commentée</p>
        </div>
        <button class="btn btn-ghost" onclick="navigate('outils')">Voir tous les outils →</button>
      </div>
      <div class="grid-4">
        ${featured.map(t => toolCardHtml(t)).join('')}
      </div>
    </div>
  </section>

  <!-- Blog -->
  <section class="section" style="background:var(--surface-2)">
    <div class="container">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:32px">
        <div>
          <h2 class="display-md" style="margin-bottom:4px">Derniers articles</h2>
          <p class="text-muted">Analyses, guides et tendances IA</p>
        </div>
        <button class="btn btn-ghost" onclick="navigate('blog')">Tous les articles →</button>
      </div>
      <div class="grid-3">
        ${latestArticles.map(a => blogCardHtml(a)).join('')}
      </div>
    </div>
  </section>

  <!-- Newsletter -->
  <section class="newsletter">
    <div class="container">
      <h2>Chaque lundi, les nouveaux outils testés.</h2>
      <p>Pas de bruit, juste ce qui marche dans votre contexte professionnel.</p>
      <div class="newsletter-form">
        <input type="email" placeholder="votre@email.com" id="nl-email-home" />
        <button class="btn btn-primary" onclick="handleNewsletter()">S'abonner gratuitement</button>
      </div>
    </div>
  </section>

  ${renderFooter()}`;
}

// Liaison depuis les cards de secteur
function setSector(id) {
  activeSector = id;
}

// ================================================================
// PAGE : OUTILS IA
// ================================================================
function renderOutils() {
  const sector = activeSector;
  const filtered = OUTILS.filter(t => {
    if (sector && !t.sector.includes(sector)) return false;
    if (activeFilter === 'tested') return t.tested;
    if (activeFilter === 'free') return t.priceType === 'Gratuit' || t.priceType === 'Freemium';
    if (activeFilter === 'api') return t.apiReady;
    return true;
  });

  return `
  <div class="page-header">
    <div class="container">
      <h1 class="display-lg">
        ${sector ? SECTEURS.find(s=>s.id===sector)?.headline || 'Outils IA' : 'Tous les outils IA'}
      </h1>
      <p class="sub">
        ${sector ? SECTEURS.find(s=>s.id===sector)?.sub || '' : 'Notre sélection complète, filtrée par secteur professionnel.'}
      </p>
    </div>
  </div>

  <div class="filters-bar">
    <div class="container">
      <div class="filters-inner">
        <!-- Secteurs -->
        <div class="sector-nav">
          <button class="sector-pill ${!sector ? 'active':''}" onclick="activeSector=null; render(); updateSEO(getSEOForPage('outils',null))">
            Tous <span class="sector-pill-count">${OUTILS.length}</span>
          </button>
          ${SECTEURS.map(s => {
            const n = OUTILS.filter(t => t.sector.includes(s.id)).length;
            return `<button class="sector-pill ${sector===s.id?'active':''}" onclick="activeSector='${s.id}'; render(); updateSEO(getSEOForPage('outils','${s.id}'))">
              ${s.label} <span class="sector-pill-count">${n}</span>
            </button>`;
          }).join('')}
        </div>
        <!-- Filtres rapides -->
        <div class="filter-group" style="margin-left:auto">
          <span class="filter-label">Filtrer :</span>
          ${['all','tested','free','api'].map(f => {
            const labels = {all:'Tous', tested:'Testés ✓', free:'Gratuit/Freemium', api:'API ready'};
            return `<button class="sector-pill ${activeFilter===f?'active':''}" style="font-size:12px" onclick="activeFilter='${f}'; render()">${labels[f]}</button>`;
          }).join('')}
        </div>
      </div>
    </div>
  </div>

  <section class="section">
    <div class="container">
      ${filtered.length === 0 ? `
        <div class="empty-state">
          <div class="empty-state-icon">🔍</div>
          <h3>Aucun outil pour ces critères</h3>
          <p>Essayez un autre filtre ou <button class="btn btn-ghost btn-sm" onclick="activeSector=null;activeFilter='all';render()">réinitialisez</button></p>
        </div>
      ` : `
        <div style="margin-bottom:16px;font-size:13px;color:var(--ink-muted)">
          <strong style="color:var(--ink)">${filtered.length}</strong> outil${filtered.length>1?'s':''} trouvé${filtered.length>1?'s':''}
        </div>
        <div class="grid-4">
          ${filtered.map(t => toolCardHtml(t)).join('')}
        </div>
      `}

      <!-- CTA Soumettre un outil -->
      <div style="margin-top:64px;padding:40px;background:var(--surface-2);border-radius:var(--radius-lg);text-align:center;border:1px dashed var(--border)">
        <div style="font-size:1.5rem;margin-bottom:12px">🛠</div>
        <h3 style="font-family:var(--font-heading);font-weight:800;margin-bottom:8px">Vous connaissez un outil qui manque ?</h3>
        <p style="color:var(--ink-muted);margin-bottom:20px;font-size:14px">Suggérez-le à notre équipe. Si il passe notre test, il sera référencé.</p>
        <button class="btn btn-primary" onclick="navigate('soumettre')">Soumettre un outil →</button>
      </div>
    </div>
  </section>

  ${renderFooter()}`;
}

// ================================================================
// PAGE : FICHE OUTIL
// ================================================================
function renderTool(id) {
  const tool = OUTILS.find(t => t.id === id);
  if (!tool) return render404();

function renderArticle(slug) {
  const article = ARTICLES.find(a => a.slug === slug);
  if (!article) return render404();

  const related = ARTICLES.filter(a => a.slug !== slug && a.sector === article.sector).slice(0,2);

  const DISCLAIMER = `<div style="background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin:32px 0;font-size:13px;color:var(--ink-muted);line-height:1.6">
    <strong style="color:var(--ink)">ℹ️ Transparence éditoriale</strong> — Cet article est le fruit d'une analyse indépendante. Lumina AI n'a reçu aucune rémunération de la part des éditeurs d'outils mentionnés pour la rédaction de ce contenu. Certains liens de ce site sont des liens affiliés : si vous vous abonnez à un outil via notre lien, nous percevons une commission sans que cela ne change le prix que vous payez. Cette politique n'influence pas nos recommandations éditoriales.
  </div>`;

  const parts = [];
  parts.push('<div class="article-header">');
  parts.push('<div class="container" style="max-width:840px;padding-top:calc(var(--nav-h) + 48px)">');
  parts.push('<button class="btn btn-ghost btn-sm" style="margin-bottom:24px" onclick="navigate(\'blog\')">← Retour au blog</button>');
  parts.push('<div class="article-label">' + article.sectorLabel + '</div>');
  parts.push('<h1 class="article-title">' + article.title + '</h1>');
  parts.push('<div style="display:flex;align-items:center;gap:16px;margin-bottom:40px;font-size:13px;color:var(--ink-muted)">');
  if (article.date) parts.push('<span>📅 ' + article.date + '</span>');
  parts.push('<span>⏱ ' + article.readTime + '</span>');
  parts.push('</div></div></div>');
  parts.push('<div class="container" style="max-width:840px;padding-bottom:80px">');
  parts.push('<img src="' + article.coverPhoto + '" alt="' + (article.coverAlt || article.title) + '" class="article-cover" loading="lazy" />');
  parts.push(DISCLAIMER);
  parts.push('<div class="article-body">');
  parts.push('<p style="font-size:17px;line-height:1.8;font-weight:400">' + article.intro + '</p>');
  if (article.pullQuote) {
    parts.push('<div class="pull-quote"><p>' + article.pullQuote + '</p></div>');
  }
  article.sections.forEach(function(s) {
    parts.push('<h2>' + s.title + '</h2>');
    parts.push('<p>' + s.body + '</p>');
  });
  parts.push(DISCLAIMER);
  parts.push('<div class="tag-list" style="margin-top:36px">');
  article.tags.forEach(function(t) { parts.push('<span class="tag">' + t + '</span>'); });
  parts.push('</div></div>');
  if (related.length > 0) {
    parts.push('<div style="margin-top:64px;padding-top:48px;border-top:1px solid var(--border)">');
    parts.push('<h3 style="font-family:var(--font-heading);font-weight:800;font-size:1.3rem;margin-bottom:24px">Articles qui pourraient vous intéresser</h3>');
    parts.push('<div class="grid-2">');
    related.forEach(function(a) { parts.push(blogCardHtml(a)); });
    parts.push('</div></div>');
  }
  parts.push('</div>');
  parts.push(renderFooter());
  return parts.join('\n');
}

window.addEventListener('DOMContentLoaded', async () => {
  // Afficher un écran de chargement
  document.getElementById('app').innerHTML = `
    <div style="min-height:80vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;padding-top:var(--nav-h)">
      <div style="width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite"></div>
      <p style="color:var(--ink-muted);font-size:14px">Chargement...</p>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>`;

  // Charger les données JSON depuis /content/
  try {
    await loadAllData();
  } catch(e) {
    console.error('Erreur de chargement des données:', e);
    document.getElementById('app').innerHTML = `
      <div style="text-align:center;padding:80px 24px">
        <p style="color:var(--ink-muted)">Erreur de chargement. Rechargez la page.</p>
      </div>`;
    return;
  }

  // Lire le hash pour deep-linking
  const hash = location.hash.replace('#', '');
  if (hash && hash !== 'home') {
    const parts = hash.split('/');
    navigate(parts[0], parts[1] || null);
  } else {
    navigate('home');
  }
});

// Gestion du bouton Retour du navigateur
window.addEventListener('popstate', () => {
  const hash = location.hash.replace('#', '');
  if (hash) {
    const parts = hash.split('/');
    navigate(parts[0], parts[1] || null);
  } else {
    navigate('home');
  }
});
</script>
